name: Taeglicher Research-Refresh

# Laeuft automatisch frueh morgens (ca. 02:00 Ortszeit, mit Backup-Lauf) und auf Knopfdruck.
# Cron in GitHub Actions ist UTC. Details siehe Zeitplan unten.
on:
  schedule:
    # GitHub-Cron laeuft in UTC (keine Sommer-/Winterzeit). Liechtenstein = UTC+2 (Sommer) / UTC+1 (Winter).
    # Ziel: ~02:00 Ortszeit. Krumme Minute = weniger Cron-Stau, zweiter Lauf als Ausfallsicherung
    # (inkrementell, daher fast kostenlos, falls der erste Versuch ausfaellt).
    - cron: "17 0 * * *"    # 00:17 UTC  = 02:17 Sommerzeit / 01:17 Winterzeit
    - cron: "17 2 * * *"    # 02:17 UTC  = 04:17 Sommerzeit / 03:17 Winterzeit (Backup)
  workflow_dispatch: {}     # manueller Start ueber den "Run workflow"-Button

permissions:
  contents: write           # noetig, um snapshot.json zurueck ins Repo zu committen

concurrency:
  group: research-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Repo auschecken
        uses: actions/checkout@v6

      - name: Python einrichten
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Abhaengigkeiten installieren
        run: pip install -r apps/research-dashboard/requirements.txt

      - name: Datensammler ausfuehren
        env:
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python apps/research-dashboard/scripts/research.py

      - name: Snapshot committen (falls geaendert)
        run: |
          git config user.name  "research-bot"
          git config user.email "actions@users.noreply.github.com"
          git add docs/research-dashboard/data/snapshot.json
          if git diff --staged --quiet; then
            echo "Keine Aenderungen am Snapshot."
          else
            git commit -m "Daten-Refresh $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi
